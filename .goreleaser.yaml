version: 2

project_name: bouncing

before:
  hooks:
    - go mod tidy

builds:
  - id: bouncing
    main: ./cmd/bouncing
    binary: bouncing
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  algorithm: sha256

release:
  github:
    owner: scttfrdmn
    name: bouncing

changelog:
  use: git
  sort: asc
  filters:
    exclude:
      - "^chore"
      - "^docs"
      - "^test"
