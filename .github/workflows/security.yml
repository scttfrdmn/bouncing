name: Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 8 * * 1" # Weekly Monday 08:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  security:
    name: Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # --- Go setup ---
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      # --- govulncheck (call-graph analysis — only reports reachable vulns) ---
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

      # --- gosec (Go security linter) ---
      - name: gosec
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          gosec -exclude=G101,G118,G124,G202,G304,G306,G602,G703 ./...

      # --- Trivy filesystem scan (dependency CVEs) ---
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: 1

      # --- Trivy IaC scan (Dockerfile, config misconfigurations) ---
      - name: Trivy IaC scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: 1

      # --- Semgrep SAST (cross-language static analysis) ---
      - name: Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: auto
