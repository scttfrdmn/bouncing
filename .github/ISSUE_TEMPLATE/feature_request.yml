name: Feature Request
description: Propose a new feature or improvement
labels: ["type/feature"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion. Be specific — vague requests are hard to act on.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the use case. Who needs this and why?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How should it work? API shape, config syntax, UX — the more concrete the better.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you've considered
